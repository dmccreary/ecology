<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Ecological Succession Timeline Wireframe</title>
  <style>
    body {
      font-family: Arial, Helvetica, sans-serif;
      margin: 0;
      padding: 24px;
      background: #f4f7fb;
      color: #1d2731;
    }
    h1 {
      text-align: center;
      margin-bottom: 12px;
    }
    p {
      text-align: center;
      margin: 0 0 24px;
      color: #3f536b;
    }
    svg {
      width: 100%;
      max-width: 1200px;
      display: block;
      margin: 0 auto;
      border: 1px solid #d0d8e1;
      background: #fff;
    }
    .label {
      font-size: 16px;
      font-weight: bold;
    }
    .detail {
      font-size: 14px;
    }
  </style>
</head>
<body>
  <h1>Ecological Succession Timeline Wireframe Plan</h1>
  <p>Rectangles mark responsive bands; internal horizontal arrows show which regions stretch with canvas width.</p>
  <svg viewBox="0 0 1200 900" role="img" aria-label="Wireframe layout for Ecological Succession Timeline">
    <defs>
      <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
        <polygon points="0 0, 10 3.5, 0 7" fill="#4b5f73"></polygon>
      </marker>
      <marker id="arrowhead-start" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
        <polygon points="10 0, 0 3.5, 10 7" fill="#4b5f73"></polygon>
      </marker>
    </defs>

    <!-- Drawing area -->
    <rect x="30" y="60" width="1140" height="520" fill="aliceblue" stroke="silver" stroke-width="2" rx="6" />
    <text x="600" y="90" text-anchor="middle" class="label">Drawing Region (Responsive Width)</text>
    <line x1="60" y1="110" x2="1140" y2="110" stroke="#4b5f73" stroke-width="2" marker-start="url(#arrowhead-start)" marker-end="url(#arrowhead)" />

    <!-- Title band -->
    <rect x="60" y="100" width="1080" height="50" fill="rgba(255,255,255,0.7)" stroke="#9aa7b8" stroke-dasharray="6 4" />
    <text x="600" y="130" text-anchor="middle" class="label">Title: Ecological Succession Timeline</text>

    <!-- Stage summary banner -->
    <rect x="60" y="170" width="1080" height="50" fill="rgba(224,238,255,0.9)" stroke="#9aa7b8" />
    <text x="600" y="200" text-anchor="middle" class="label">Stage Summary Banner (Read-only)</text>
    <text x="600" y="218" text-anchor="middle" class="detail">Displays current stage name, time elapsed, and key cue</text>
    <line x1="80" y1="185" x2="1120" y2="185" stroke="#4b5f73" stroke-width="1.5" marker-start="url(#arrowhead-start)" marker-end="url(#arrowhead)" />

    <!-- Landscape + detail panels -->
    <rect x="60" y="240" width="750" height="230" fill="#e4f0ff" stroke="#7b8da3" />
    <text x="435" y="270" text-anchor="middle" class="label">Landscape Illustration Panel</text>
    <text x="435" y="290" text-anchor="middle" class="detail">Terrain, soil layers, species icons, progression visuals</text>
    <line x1="80" y1="305" x2="790" y2="305" stroke="#4b5f73" stroke-width="1.5" marker-start="url(#arrowhead-start)" marker-end="url(#arrowhead)" />

    <rect x="830" y="240" width="310" height="230" fill="#f8fbff" stroke="#7b8da3" />
    <text x="985" y="270" text-anchor="middle" class="label">Detail Panel</text>
    <text x="985" y="290" text-anchor="middle" class="detail">Stage summary & species list</text>
    <line x1="845" y1="305" x2="1125" y2="305" stroke="#4b5f73" stroke-width="1.5" marker-start="url(#arrowhead-start)" marker-end="url(#arrowhead)" />

    <!-- Stage comparison inset -->
    <rect x="90" y="330" width="690" height="120" fill="#f0f5ff" stroke="#c2cfdf" stroke-dasharray="4 6" />
    <text x="435" y="360" text-anchor="middle" class="detail">Primary vs Secondary snapshots share this responsive width</text>
    <line x1="110" y1="380" x2="760" y2="380" stroke="#4b5f73" stroke-width="1" marker-start="url(#arrowhead-start)" marker-end="url(#arrowhead)" />

    <!-- Timeline row -->
    <rect x="60" y="490" width="1080" height="70" fill="#fff" stroke="#9aa7b8" stroke-dasharray="4 4" />
    <text x="600" y="520" text-anchor="middle" class="label">Timeline / Stage Selector</text>
    <text x="600" y="540" text-anchor="middle" class="detail">Clickable ticks, draggable handle, time scale labels</text>
    <line x1="80" y1="560" x2="1120" y2="560" stroke="#4b5f73" stroke-width="1.5" marker-start="url(#arrowhead-start)" marker-end="url(#arrowhead)" />

    <!-- Soil depth indicator -->
    <rect x="60" y="570" width="1080" height="40" fill="#eef3ff" stroke="#9aa7b8" />
    <text x="600" y="595" text-anchor="middle" class="detail">Soil depth bar + time annotations</text>
    <line x1="80" y1="585" x2="1120" y2="585" stroke="#4b5f73" stroke-width="1" marker-start="url(#arrowhead-start)" marker-end="url(#arrowhead)" />

    <!-- Controls area -->
    <rect x="30" y="600" width="1140" height="240" fill="white" stroke="silver" stroke-width="2" rx="6" />
    <text x="600" y="630" text-anchor="middle" class="label">Control Region (anchored below drawing)</text>
    <line x1="60" y1="650" x2="1140" y2="650" stroke="#4b5f73" stroke-width="2" marker-start="url(#arrowhead-start)" marker-end="url(#arrowhead)" />

    <!-- Control rows -->
    <rect x="60" y="660" width="330" height="70" fill="#fdfdfd" stroke="#c4ccd6" />
    <text x="225" y="690" text-anchor="middle" class="label">Start / Pause Simulation</text>
    <text x="225" y="710" text-anchor="middle" class="detail">Primary button + status text</text>

    <rect x="410" y="660" width="180" height="70" fill="#fdfdfd" stroke="#c4ccd6" />
    <text x="500" y="690" text-anchor="middle" class="label">Succession Mode Buttons</text>
    <text x="500" y="710" text-anchor="middle" class="detail">Primary / Secondary</text>

    <rect x="620" y="660" width="240" height="70" fill="#fdfdfd" stroke="#c4ccd6" />
    <text x="740" y="690" text-anchor="middle" class="label">Stage Dropdown</text>
    <text x="740" y="710" text-anchor="middle" class="detail">Lichens, grasses, shrubs, forest...</text>

    <rect x="880" y="660" width="260" height="70" fill="#fdfdfd" stroke="#c4ccd6" />
    <text x="1010" y="690" text-anchor="middle" class="label">Compare Mode Toggle</text>
    <text x="1010" y="710" text-anchor="middle" class="detail">Stack panels vertically when narrow</text>

    <rect x="60" y="750" width="520" height="70" fill="#fdfdfd" stroke="#c4ccd6" />
    <text x="320" y="780" text-anchor="middle" class="label">Timeline Scrubber Controls</text>
    <text x="320" y="800" text-anchor="middle" class="detail">Jump to stage, animate progression</text>

    <rect x="600" y="750" width="540" height="70" fill="#fdfdfd" stroke="#c4ccd6" />
    <text x="870" y="780" text-anchor="middle" class="label">Display Toggles</text>
    <text x="870" y="800" text-anchor="middle" class="detail">Show soil bar, show time scales, highlight species</text>
  </svg>
</body>
</html>
