site_name: Ecology - An Interactive Course
repo_url: https://github.com/dmccreary/ecology
site_url: https://dmccreary.github.io/ecology/
site_description: An interactive intelligent textbook for Ecology.
site_author: Dan McCreary

nav:
  - Home: index.md
  - Course Description: course-description.md
  - Chapters:
    - Overview: chapters/index.md
    - 1-Foundations of Ecology: chapters/01-foundations-of-ecology/index.md
    - 2-Ecosystems and Biomes: chapters/02-ecosystems-and-biomes/index.md
    - 3-Energy Flow: chapters/03-energy-flow/index.md
    - 4-Biogeochemical Cycles: chapters/04-biogeochemical-cycles/index.md
    - 5-Species Interactions: chapters/05-species-interactions/index.md
    - 6-Biodiversity and Services: chapters/06-biodiversity-and-services/index.md
    - 7-Population Ecology: chapters/07-population-ecology/index.md
    - 8-Earth Systems: chapters/08-earth-systems/index.md
    - 9-Sustainability and Energy: chapters/09-sustainability-and-energy/index.md
    - 10-Land and Water Use: chapters/10-land-and-water-use/index.md
    - 11-Atmospheric Pollution: chapters/11-atmospheric-pollution/index.md
    - 12-Water and Land Pollution: chapters/12-water-and-land-pollution/index.md
    - 13-Systems Thinking: chapters/13-systems-thinking/index.md
    - 14-Scientific Literacy: chapters/14-scientific-literacy/index.md
    - 15-Global Climate Change: chapters/15-global-climate-change/index.md
    - 16-Biodiversity Loss and Policy: chapters/16-biodiversity-loss-and-policy/index.md
    - 17-Evaluating Claims: chapters/17-evaluating-environmental-claims/index.md
  - Learning Graph:
    - Introduction: learning-graph/index.md
    - Course Description Assessment: learning-graph/course-description-assessment.md
    - Concept Enumeration: learning-graph/concept-list.md
    - Concept Taxonomy: learning-graph/concept-taxonomy.md
    - Graph Quality Analysis: learning-graph/quality-metrics.md
    - Taxonomy Distribution: learning-graph/taxonomy-distribution.md
    - Mascot Style Guide: learning-graph/mascot-test.md
  - MicroSims:
    - Graph Viewer: sims/graph-viewer/index.md
  - Prompts:
    - Seed Prompt: prompts/01-seed.md
    - Content Style Guide: prompts/02-content-generaton-style-guide.md
  - Logs:
    - Course Description Generation: logs/01-course-description-generation.md
    - Learning Graph Generation: logs/02-generate-learning-graph.md
    - Book Chapter Generator: logs/03-book-chapter-generator.md
    - Mascot Generator: logs/04-mascot-generator.md
    - Ch 1 Content Generation: logs/ch-01-content-generation.md
    - Batch Content Generation: logs/chapter-content-generator-2026-03-29.md
  - License: license.md
  - Contact: contact.md

theme:
  name: material
  # logo: img/logo.png
  favicon: img/favicon.ico
  palette:
    primary: 'green'
    accent: 'white'
  include_sidebar: true
  features:
    - content.code.copy
    - navigation.expand
    - navigation.path
    - navigation.prune
    - navigation.indexes
    - toc.follow
    - navigation.top
    - navigation.footer
    - content.action.edit

plugins:
  - search
  - social
  - social_override
  - glightbox:
      touchNavigation: true
      loop: false
      effect: zoom
      slide_effect: slide
      width: 100%
      height: auto
      zoomable: true
      draggable: true
      auto_caption: false
      caption_position: bottom

markdown_extensions:
  - md_in_html
  - attr_list
  - admonition
  - footnotes
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      linenums: true
  - pymdownx.arithmatex:
      generic: true

extra_css:
  - css/extra.css
  - css/mascot.css

extra_javascript:
  - js/extra.js
  - js/mathjax-config.js
  - https://unpkg.com/mathjax@3/es5/tex-chtml.js

watch:
  - docs
  - mkdocs.yml

copyright: Copyright &copy; 2025 Dan McCreary. Licensed under <a href="license/">CC BY-NC-SA 4.0</a> for non-commercial use.

extra:
  generator: false
  analytics:
    provider: google
    property: G-XXXXXXXXXX
  schema: https://dmccreary.github.io/intelligent-textbooks/ns/textbook/v1
  textbook_name: Ecology
  textbook_version: "1.0"
